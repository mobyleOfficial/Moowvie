name: Android CD - Deploy to Google Play Beta (Prod)

on:
  push:
    branches:
      - main
    paths:
      - 'lib/**'
      - 'android/**'
      - 'fastlane/**'
      - '.github/workflows/android-cd-prod.yml'
      - 'pubspec.yaml'

jobs:
  config:
    name: Load Configuration
    runs-on: ubuntu-latest
    outputs:
      deploy_android: ${{ steps.config.outputs.deploy_android }}
      flutter_version: ${{ steps.config.outputs.flutter_version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read .actions.yml
        id: config
        run: |
          # Check if .actions.yml exists
          if [ ! -f .actions.yml ]; then
            echo "ERROR: .actions.yml file not found"
            exit 1
          fi

          # Parse values and trim whitespace with xargs
          deploy_android=$(grep -E '^\s*deploy_android:\s*' .actions.yml | sed 's/.*:\s*//' | xargs)
          flutter_version=$(grep -E '^\s*flutter_version:\s*' .actions.yml | sed 's/.*:\s*//' | tr -d '"' | xargs)

          # Validate required values are not empty
          if [ -z "$deploy_android" ] || [ -z "$flutter_version" ]; then
            echo "ERROR: Missing required values in .actions.yml"
            echo "  deploy_android: $deploy_android"
            echo "  flutter_version: $flutter_version"
            exit 1
          fi

          # Export values
          echo "deploy_android=$deploy_android" >> $GITHUB_OUTPUT
          echo "flutter_version=$flutter_version" >> $GITHUB_OUTPUT

          # Debug output
          echo "Configuration loaded:"
          echo "  deploy_android=$deploy_android"
          echo "  flutter_version=$flutter_version"

  deploy:
    name: Deploy to Google Play Beta
    needs: config
    if: needs.config.outputs.deploy_android == 'true'
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ needs.config.outputs.flutter_version }}
          cache: true

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Setup Android signing
        run: |
          mkdir -p android/app/signing
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64_PROD }}" | base64 -d > android/app/signing/upload-keystore.jks
          cat > android/key.properties << EOF
          storeFile=app/signing/upload-keystore.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD_PROD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS_PROD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD_PROD }}
          EOF

      - name: Build Flutter Android (prod)
        run: |
          flutter build appbundle \
            --flavor=prod \
            --dart-define-from-file=secrets/.env \
            --release

      - name: Deploy to Google Play (Prod)
        run: |
          cd android
          bundle exec fastlane deploy_play env:prod dry_run:false
        env:
          GOOGLE_PLAY_API_JSON_PROD: ${{ secrets.GOOGLE_PLAY_API_JSON_PROD }}

      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f android/key.properties
          rm -f android/app/signing/upload-keystore.jks
          echo "Sensitive files cleaned up"

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-logs
          path: fastlane/report.xml
          retention-days: 7
