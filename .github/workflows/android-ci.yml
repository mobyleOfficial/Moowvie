name: Android CI - Build and Test

on:
  push:
    branches:
      - dev
      - main
    paths:
      - 'lib/**'
      - 'android/**'
      - 'test/**'
      - 'fastlane/**'
      - '.github/workflows/android-ci.yml'
      - '.actions.yml'
      - 'pubspec.yaml'
  pull_request:
    branches:
      - dev
      - main
    paths:
      - 'lib/**'
      - 'android/**'
      - 'test/**'
      - 'fastlane/**'
      - '.github/workflows/android-ci.yml'
      - '.actions.yml'
      - 'pubspec.yaml'

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  config:
    name: Load Configuration
    runs-on: ubuntu-latest
    outputs:
      run_android_tests: ${{ steps.config.outputs.run_android_tests }}
      run_linter: ${{ steps.config.outputs.run_linter }}
      flutter_version: ${{ steps.config.outputs.flutter_version }}
      android_java_version: ${{ steps.config.outputs.android_java_version }}
      android_java_distribution: ${{ steps.config.outputs.android_java_distribution }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read .actions.yml
        id: config
        run: |
          # Check if .actions.yml exists
          if [ ! -f .actions.yml ]; then
            echo "ERROR: .actions.yml file not found"
            exit 1
          fi

          # Parse values and trim whitespace with xargs
          run_android_tests=$(grep -E '^\s*run_android_tests:\s*' .actions.yml | sed 's/.*:\s*//' | xargs)
          run_linter=$(grep -E '^\s*run_linter:\s*' .actions.yml | sed 's/.*:\s*//' | xargs)
          flutter_version=$(grep -E '^\s*flutter_version:\s*' .actions.yml | sed 's/.*:\s*//' | tr -d '"' | xargs)
          android_java_version=$(grep -E '^\s*android_java_version:\s*' .actions.yml | sed 's/.*:\s*//' | tr -d '"' | xargs)
          android_java_distribution=$(grep -E '^\s*android_java_distribution:\s*' .actions.yml | sed 's/.*:\s*//' | tr -d '"' | xargs)

          # Validate required values are not empty
          if [ -z "$run_android_tests" ] || [ -z "$flutter_version" ] || [ -z "$android_java_version" ] || [ -z "$android_java_distribution" ]; then
            echo "ERROR: Missing required values in .actions.yml"
            echo "  run_android_tests: $run_android_tests"
            echo "  flutter_version: $flutter_version"
            echo "  android_java_version: $android_java_version"
            echo "  android_java_distribution: $android_java_distribution"
            exit 1
          fi

          # Export values
          echo "run_android_tests=$run_android_tests" >> $GITHUB_OUTPUT
          echo "run_linter=$run_linter" >> $GITHUB_OUTPUT
          echo "flutter_version=$flutter_version" >> $GITHUB_OUTPUT
          echo "android_java_version=$android_java_version" >> $GITHUB_OUTPUT
          echo "android_java_distribution=$android_java_distribution" >> $GITHUB_OUTPUT

          # Debug output
          echo "Configuration loaded:"
          echo "  run_android_tests=$run_android_tests"
          echo "  run_linter=$run_linter"
          echo "  flutter_version=$flutter_version"
          echo "  android_java_version=$android_java_version"
          echo "  android_java_distribution=$android_java_distribution"

  test:
    name: Android Tests
    needs: config
    if: needs.config.outputs.run_android_tests == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: ${{ needs.config.outputs.android_java_version }}
          distribution: ${{ needs.config.outputs.android_java_distribution }}
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ needs.config.outputs.flutter_version }}
          cache: true

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run linter
        if: needs.config.outputs.run_linter == 'true'
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build Android APK (dry run)
        run: flutter build apk --flavor=dev --release

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/apk/
          retention-days: 7
