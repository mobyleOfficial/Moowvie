name: CI - Build and Test

on:
  push:
    branches:
      - dev
      - main
    paths:
      - 'lib/**'
      - 'ios/**'
      - 'android/**'
      - 'test/**'
      - 'fastlane/**'
      - '.github/workflows/ci.yml'
      - '.actions.yml'
      - 'pubspec.yaml'
  pull_request:
    branches:
      - dev
      - main
    paths:
      - 'lib/**'
      - 'ios/**'
      - 'android/**'
      - 'test/**'
      - 'fastlane/**'
      - '.github/workflows/ci.yml'
      - '.actions.yml'
      - 'pubspec.yaml'

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  config:
    uses: ./.github/workflows/load-config.yml

  lint:
    name: Lint
    needs: config
    runs-on: ubuntu-latest
    if: needs.config.outputs.run_linter == 'true'
    env:
      FASTLANE_SKIP_UPDATE_CHECK: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup-environment
        with:
          flutter-version: ${{ needs.config.outputs.flutter_version }}
          ruby-version: ${{ needs.config.outputs.ruby_version }}
          setup-ci-env: 'false'

      - name: Analyze Dart
        uses: zgosalvez/github-actions-analyze-dart@v4
        with:
          fail-on-warnings: false
          fail-on-infos: false

  test-ios:
    name: iOS - Test & Build
    needs: config
    if: needs.config.outputs.run_ios_tests == 'true'
    runs-on: macos-${{ needs.config.outputs.macos_version }}
    environment: dev
    env:
      FASTLANE_SKIP_UPDATE_CHECK: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup-environment
        with:
          flutter-version: ${{ needs.config.outputs.flutter_version }}
          ruby-version: ${{ needs.config.outputs.ruby_version }}
          tmdb-api-key: ${{ secrets.TMDB_API_KEY }}
          backend-url: ${{ secrets.BACKEND_URL }}

      - name: Run tests
        run: bundle exec fastlane test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-coverage
          path: testResults/
          retention-days: 7

      - name: Build iOS
        run: bundle exec fastlane ios build flavor:dev simulator:true

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios/iphonesimulator/
          retention-days: 7

  test-android:
    name: Android - Test & Build
    needs: config
    if: needs.config.outputs.run_android_tests == 'true'
    runs-on: ubuntu-latest
    environment: dev
    env:
      FASTLANE_SKIP_UPDATE_CHECK: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup-environment
        with:
          flutter-version: ${{ needs.config.outputs.flutter_version }}
          ruby-version: ${{ needs.config.outputs.ruby_version }}
          setup-java: 'true'
          java-version: ${{ needs.config.outputs.android_java_version }}
          java-distribution: ${{ needs.config.outputs.android_java_distribution }}
          tmdb-api-key: ${{ secrets.TMDB_API_KEY }}
          backend-url: ${{ secrets.BACKEND_URL }}

      - name: Run tests
        run: bundle exec fastlane test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-coverage
          path: testResults/
          retention-days: 7

      - name: Build Android
        run: bundle exec fastlane android build flavor:dev

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/apk/
          retention-days: 7

  report:
    name: Report Coverage & Tests
    needs: [test-ios, test-android]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download iOS coverage
        uses: actions/download-artifact@v4
        with:
          name: ios-coverage
          path: coverage-ios/

      - name: Download Android coverage
        uses: actions/download-artifact@v4
        with:
          name: android-coverage
          path: coverage-android/

      - name: Merge coverage reports
        run: |
          mkdir -p testResults
          cp coverage-ios/lcov.info testResults/lcov.info || true

      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov

      - name: Report Coverage
        uses: zgosalvez/github-actions-report-lcov@v4
        with:
          coverage-files: testResults/lcov.info
          minimum-coverage: ${{ needs.config.outputs.test_coverage_minimum }}
