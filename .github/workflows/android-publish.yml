name: Android Publish - Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment (dev, staging, or prod)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
  push:
    branches:
      - main
    paths:
      - 'lib/**'
      - 'android/**'
      - 'fastlane/**'
      - 'pubspec.yaml'

jobs:
  validate:
    name: Validate Branch
    runs-on: ubuntu-latest
    steps:
      - name: Check branch
        run: |
          BRANCH=${{ github.ref_name }}
          if [[ "$BRANCH" != "dev" && "$BRANCH" != "main" ]]; then
            echo "❌ Error: Can only deploy from 'dev' or 'main' branches"
            echo "Current branch: $BRANCH"
            exit 1
          fi
          echo "✅ Branch validation passed: $BRANCH"

  config:
    needs: validate
    uses: ./.github/workflows/load-config.yml

  deploy:
    name: Deploy to Google Play (${{ github.event_name == 'push' && 'prod' || inputs.environment }})
    needs: config
    if: needs.config.outputs.deploy_android == 'true'
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'push' && 'prod' || inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: ${{ needs.config.outputs.android_java_version }}
          distribution: ${{ needs.config.outputs.android_java_distribution }}
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ needs.config.outputs.flutter_version }}
          cache: true

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ needs.config.outputs.ruby_version }}
          bundler-cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: bundle exec fastlane codegen

      - name: Determine flavor
        id: flavor
        run: |
          ENV="${{ github.event_name == 'push' && 'prod' || inputs.environment }}"
          if [[ "$ENV" == "prod" ]]; then
            echo "flavor=prod" >> $GITHUB_OUTPUT
          elif [[ "$ENV" == "staging" ]]; then
            echo "flavor=staging" >> $GITHUB_OUTPUT
          else
            echo "flavor=dev" >> $GITHUB_OUTPUT
          fi

      - name: Setup Android signing
        run: |
          mkdir -p android/app/signing
          ENV_UPPER=${{ inputs.environment }}
          ENV_UPPER=${ENV_UPPER^^}
          SECRET_KEYSTORE="ANDROID_KEYSTORE_BASE64_${ENV_UPPER}"
          SECRET_PASS="ANDROID_KEYSTORE_PASSWORD_${ENV_UPPER}"
          SECRET_ALIAS="ANDROID_KEY_ALIAS_${ENV_UPPER}"
          SECRET_KEY_PASS="ANDROID_KEY_PASSWORD_${ENV_UPPER}"

          echo "${!SECRET_KEYSTORE}" | base64 -d > android/app/signing/upload-keystore.jks
          cat > android/key.properties << EOF
          storeFile=app/signing/upload-keystore.jks
          storePassword=${!SECRET_PASS}
          keyAlias=${!SECRET_ALIAS}
          keyPassword=${!SECRET_KEY_PASS}
          EOF

      - name: Setup CI environment
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: bundle exec fastlane setup_ci_env

      - name: Build Android (${{ steps.flavor.outputs.flavor }})
        run: bundle exec fastlane android build flavor:${{ steps.flavor.outputs.flavor }}
        env:
          FASTLANE_SKIP_UPDATE_CHECK: 1

      - name: Deploy to Google Play (${{ github.event_name == 'push' && 'prod' || inputs.environment }})
        run: |
          cd android
          bundle exec fastlane deploy_play env:${{ github.event_name == 'push' && 'prod' || inputs.environment }} dry_run:false
        env:
          FASTLANE_SKIP_UPDATE_CHECK: 1
          GOOGLE_PLAY_API_JSON_DEV: ${{ secrets.GOOGLE_PLAY_API_JSON_DEV }}
          GOOGLE_PLAY_API_JSON_STAGING: ${{ secrets.GOOGLE_PLAY_API_JSON_STAGING }}
          GOOGLE_PLAY_API_JSON_PROD: ${{ secrets.GOOGLE_PLAY_API_JSON_PROD }}

      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f android/key.properties
          rm -f android/app/signing/upload-keystore.jks
          echo "Sensitive files cleaned up"

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-publish-logs
          path: fastlane/report.xml
          retention-days: 7
