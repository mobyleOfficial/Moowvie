name: iOS Publish - Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment (dev, staging, or prod)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
  push:
    branches:
      - main
    paths:
      - 'lib/**'
      - 'ios/**'
      - 'fastlane/**'
      - 'pubspec.yaml'

jobs:
  validate:
    name: Validate Branch
    runs-on: ubuntu-latest
    steps:
      - name: Check branch
        run: |
          BRANCH=${{ github.ref_name }}
          if [[ "$BRANCH" != "dev" && "$BRANCH" != "main" ]]; then
            echo "❌ Error: Can only deploy from 'dev' or 'main' branches"
            echo "Current branch: $BRANCH"
            exit 1
          fi
          echo "✅ Branch validation passed: $BRANCH"

  config:
    needs: validate
    uses: ./.github/workflows/load-config.yml

  deploy:
    name: Deploy to TestFlight (${{ github.event_name == 'push' && 'prod' || inputs.environment }})
    needs: config
    if: needs.config.outputs.deploy_ios == 'true'
    runs-on: macos-latest
    environment: ${{ github.event_name == 'push' && 'prod' || inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ needs.config.outputs.flutter_version }}
          cache: true

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ needs.config.outputs.ruby_version }}
          bundler-cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: bundle exec fastlane codegen

      - name: Determine flavor
        id: flavor
        run: |
          ENV="${{ github.event_name == 'push' && 'prod' || inputs.environment }}"
          if [[ "$ENV" == "prod" ]]; then
            echo "flavor=prod" >> $GITHUB_OUTPUT
          elif [[ "$ENV" == "staging" ]]; then
            echo "flavor=staging" >> $GITHUB_OUTPUT
          else
            echo "flavor=dev" >> $GITHUB_OUTPUT
          fi

      - name: Setup CI environment
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: bundle exec fastlane setup_ci_env

      - name: Build iOS (${{ steps.flavor.outputs.flavor }})
        run: bundle exec fastlane ios build flavor:${{ steps.flavor.outputs.flavor }}
        env:
          FASTLANE_SKIP_UPDATE_CHECK: 1

      - name: Deploy to TestFlight (${{ github.event_name == 'push' && 'prod' || inputs.environment }})
        run: |
          cd ios
          bundle exec fastlane deploy_testflight env:${{ github.event_name == 'push' && 'prod' || inputs.environment }} dry_run:false
        env:
          FASTLANE_SKIP_UPDATE_CHECK: 1
          APP_STORE_CONNECT_API_KEY_ID_DEV: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID_DEV }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID_DEV: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID_DEV }}
          APP_STORE_CONNECT_API_KEY_CONTENT_DEV: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT_DEV }}
          APP_STORE_CONNECT_API_KEY_ID_STAGING: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID_STAGING }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID_STAGING: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID_STAGING }}
          APP_STORE_CONNECT_API_KEY_CONTENT_STAGING: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT_STAGING }}
          APP_STORE_CONNECT_API_KEY_ID_PROD: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID_PROD }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID_PROD: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID_PROD }}
          APP_STORE_CONNECT_API_KEY_CONTENT_PROD: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT_PROD }}

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-publish-logs
          path: fastlane/report.xml
          retention-days: 7
